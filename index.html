<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropSarathi - Real Estate Advisor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'serif': ['"Playfair Display"', 'serif'],
            'sans': ['"Inter"', 'sans-serif'],
          },
          colors: {
            'brand-primary': '#003366', // A deep, professional blue
            'brand-secondary': '#D4AF37', // A sophisticated gold/ochre accent
            'brand-light': '#F8F9FA', // Off-white background
            'brand-dark': '#212529', // Main text color
            'brand-muted': '#6C757D', // Muted text for secondary info
            'brand-bg-alt': '#E9ECEF', // Alternate background for sections
          }
        }
      }
    }
  </script>
<style>
  html {
    scroll-behavior: smooth;
  }
  @keyframes fade-in-down {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in-down { animation: fade-in-down 0.8s ease-out forwards; }
  .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
  
  .section-hidden {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
  }
  .section-visible {
    opacity: 1;
    transform: translateY(0);
  }

  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .animate-scroll {
    animation: scroll 60s linear infinite;
  }
  .animate-scroll-slow {
    animation: scroll 90s linear infinite;
  }
  .animate-scroll-properties {
    animation: scroll 120s linear infinite;
  }
  .mask-gradient {
    -webkit-mask-image: linear-gradient(to right, transparent, white 20%, white 80%, transparent);
    mask-image: linear-gradient(to right, transparent, white 20%, white 80%, transparent);
  }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "marked": "https://esm.sh/marked@4.3.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-brand-light">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
